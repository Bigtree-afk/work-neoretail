<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#6B4FE0">
<title>ONE</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%236B4FE0'/><text x='50' y='68' font-size='58' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='900'>O</text></svg>">
<link rel="stylesheet" href="/one/one.css?v=2026-07-22-5">
</head>
<body>
<div class="app">
  <div class="topbar">
    <button class="icon-btn" id="navToggle" title="사이드바 접기">☰</button>
    <div class="brand"><span class="logo">O</span> ONE</div>
    <div class="nb-switch" id="nbSwitch"><span class="dot"></span><span id="nbName">필기장</span><span class="chev">▾</span></div>
    <div class="search"><span>🔍</span><input placeholder="검색 (준비 중)"></div>
    <div class="tb-actions">
      <span class="save-ind" id="saveInd"></span>
      <button class="icon-btn" id="themeBtn" title="테마">◑</button>
    </div>
  </div>

  <div class="main" id="mainGrid">
    <div class="rail" id="rail"></div>

    <div class="col col-nav" id="colNav">
      <div class="col-head"><span class="t" id="navHead">내용</span><button class="add" id="addSec" title="새 섹션/그룹">＋</button></div>
      <div class="tree" id="tree"></div>
    </div>

    <div class="canvas-wrap">
      <div class="crumb" id="crumb"></div>
      <div class="toolbar" id="toolbar" style="display:none">
        <button id="tbBold" title="굵게 (Ctrl+B)"><b>B</b></button>
        <button id="tbH1" title="제목1">H1</button>
        <button id="tbH2" title="제목2">H2</button>
        <span class="tsep"></span>
        <button id="tbList" title="글머리 목록">•</button>
        <button id="tbOList" title="번호 목록">1.</button>
        <button id="tbQuote" title="인용">❝</button>
        <span class="tsep"></span>
        <button id="tbTable" title="표 만들기">⊞ <span class="tlabel">표</span></button>
        <button id="tbAttach" title="파일 첨부">📎 <span class="tlabel">첨부</span></button>
        <span class="tsep"></span>
        <button id="tbFontColorBtn" class="colorbtn" title="글자색"><span class="ca">A</span></button>
        <input type="color" id="tbFontColor" value="#e1567a" style="position:absolute;width:0;height:0;opacity:0;pointer-events:none">
        <button id="tbCellColorBtn" class="colorbtn" title="칸 배경색"><span class="cb">▨</span></button>
        <input type="color" id="tbCellColor" value="#fef3c7" style="position:absolute;width:0;height:0;opacity:0;pointer-events:none">
        <button id="tbCellColorClear" title="칸색 지우기">▨✕</button>
        <span class="ttools" id="ttools" style="display:none">
          <span class="tsep"></span>
          <span class="tlabel" style="color:var(--accent);padding:0 2px">표</span>
          <button id="tbRowAbove" title="위에 행 추가">⤒</button>
          <button id="tbRowBelow" title="아래 행 추가">⤓</button>
          <button id="tbColLeft" title="왼쪽 열 추가">⇤</button>
          <button id="tbColRight" title="오른쪽 열 추가">⇥</button>
          <button id="tbDelRow" title="행 삭제">−행</button>
          <button id="tbDelCol" title="열 삭제">−열</button>
          <span class="tsep"></span>
          <button id="tbMerge" title="선택한 칸 병합 (드래그로 여러 칸 선택 후)">⧉ <span class="tlabel">병합</span></button>
          <button id="tbSplit" title="병합 해제(분할)">⊟ <span class="tlabel">분할</span></button>
          <span class="tsep"></span>
          <button id="tbHeadRow" title="머리행 토글">머리</button>
          <button id="tbDelTable" class="danger" title="표 삭제">🗑</button>
        </span>
      </div>
      <div class="canvas"><div id="canvasArea"></div></div>
    </div>
  </div>
</div>

<button class="newpage-fab" id="newPageFab" title="새 페이지">＋</button>

<script src="/one/one.js?v=2026-07-22-5"></script>
</body>
</html>
