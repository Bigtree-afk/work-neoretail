<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#6B4FE0">
<title>ONE</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%236B4FE0'/><text x='50' y='68' font-size='58' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='900'>O</text></svg>">
<link rel="stylesheet" href="/one/one.css?v=2026-07-20-1">
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand"><span class="logo">O</span> ONE</div>
    <div class="nb-switch" id="nbSwitch"><span class="dot"></span><span id="nbName">필기장</span><span class="chev">▾</span></div>
    <div class="search"><span>🔍</span><input placeholder="검색 (준비 중)"></div>
    <div class="tb-actions">
      <span class="save-ind" id="saveInd"></span>
      <button class="icon-btn" id="themeBtn" title="테마">◑</button>
    </div>
  </div>

  <div class="main">
    <div class="rail" id="rail"></div>

    <div class="col col-sections">
      <div class="col-head"><span class="t">섹션 · 그룹</span><button class="add" id="addSec" title="새 섹션/그룹">＋</button></div>
      <div class="tree" id="tree"></div>
    </div>

    <div class="col col-pages">
      <div class="col-head"><span class="t" id="pagesHead">페이지</span><button class="add" id="addPage" title="새 페이지">＋</button></div>
      <div class="plist" id="plist"></div>
    </div>

    <div class="canvas-wrap">
      <div class="crumb" id="crumb"></div>
      <div class="toolbar" id="toolbar" style="display:none">
        <button id="tbBold" title="굵게 (Ctrl+B)"><b>B</b></button>
        <button id="tbH1" title="제목1">H1</button>
        <button id="tbH2" title="제목2">H2</button>
        <span class="tsep"></span>
        <button id="tbList" title="글머리 목록">•&nbsp;목록</button>
        <button id="tbOList" title="번호 목록">1.</button>
        <button id="tbQuote" title="인용">❝</button>
        <span class="tsep"></span>
        <button id="tbTable" title="표 만들기">⊞ <span class="tlabel">표</span></button>
        <button id="tbAttach" title="파일 첨부">📎 <span class="tlabel">첨부</span></button>
      </div>
      <div class="canvas"><div id="canvasArea"></div></div>
    </div>
  </div>
</div>

<button class="icon-btn" id="newPageFab" title="새 페이지" style="position:fixed;right:22px;bottom:22px;width:52px;height:52px;border-radius:50%;background:#6B4FE0;color:#fff;border:none;font-size:24px;box-shadow:0 6px 20px rgba(107,79,224,.4);z-index:8">＋</button>

<script src="/one/one.js?v=2026-07-20-1"></script>
</body>
</html>
