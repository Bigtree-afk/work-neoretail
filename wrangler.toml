name = "work-neoretail"
pages_build_output_dir = "."
compatibility_date = "2026-04-22"

[vars]
PUBLIC_R2_BASE = "https://pub-c102a6c282f54e61a6aa74b74e17c235.r2.dev"

[[kv_namespaces]]
binding = "STORES_KV"
id = "81fa2de1ce5147429aabd063c2e3dc67"

# Workers AI — ONE 노트 녹음 Whisper 전사(/api/one-transcribe) 용
[ai]
binding = "AI"

# 첨부 (이미지+파일) 저장소
#   업로드 후 prefix 분리:
#     images/{yyyy}/{MM}/{uuid}.jpg
#     files/{yyyy}/{MM}/{uuid}.{ext}
#     _trash/images/...  _trash/files/...   (30일 보존 후 cron 영구삭제)
[[r2_buckets]]
binding = "ATTACHMENTS"
bucket_name = "ns-attachments"
