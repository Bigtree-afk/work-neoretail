<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>모바일 진단 — NeoRetail</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
  body{padding:16px;background:#0F172A;color:#E2E8F0;font-size:14px;line-height:1.6}
  h1{font-size:18px;margin-bottom:14px;color:#60A5FA}
  .card{background:#1E293B;border:1px solid #334155;border-radius:10px;padding:14px;margin-bottom:12px}
  .k{font-size:11px;color:#94A3B8;text-transform:uppercase;letter-spacing:.5px}
  .v{font-size:15px;font-weight:700;color:#F1F5F9;word-break:break-all;margin-top:3px}
  .ok{color:#34D399}.bad{color:#F87171}.warn{color:#FBBF24}
  button{width:100%;padding:14px;margin-top:8px;border:none;border-radius:10px;font-size:15px;font-weight:800;cursor:pointer}
  .btn-fix{background:#DC2626;color:#fff}
  .btn-reload{background:#2563EB;color:#fff}
  pre{background:#0F172A;border:1px solid #334155;border-radius:8px;padding:10px;font-size:11px;overflow-x:auto;margin-top:6px;color:#CBD5E1}
</style>
</head>
<body>
<h1>📱 모바일 동기화 진단</h1>
<div id="out">로딩 중…</div>

<button class="btn-reload" style="background:#059669" onclick="slimCache()">🗜 캐시 정리 (저장공간 확보 — 데이터 유실 없음)</button>
<button class="btn-fix" onclick="hardReset()">🧹 강제 초기화 (localStorage 비우고 서버에서 새로 받기)</button>
<button class="btn-reload" onclick="location.reload()">🔄 새로고침</button>

<script>
const TEST_STORE = '테스트매장';
function esc(s){return String(s||'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));}
function fmtKB(n){return (n/1024).toFixed(0)+'KB';}

// localStorage 사용량 분석 (문자수 기준 — 실제 바이트는 UTF-16 이라 ×2)
function storageBreakdown(){
  let items=[], total=0;
  for (let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i); const v=localStorage.getItem(k)||'';
    const chars=k.length+v.length; total+=chars; items.push([k,chars]);
  }
  items.sort((a,b)=>b[1]-a[1]);
  return {items,total};
}

// 모바일 캐시 정리 — 재생성 가능한 캐시/PC전용 백업 제거 + ns_stores 재압축. (작업/매장 실데이터 유실 없음)
function slimCache(){
  const before = storageBreakdown().total;
  // 1) 모바일에서 불필요/재생성 가능 — ns_backups(PC 자동백업), etag/snap 캐시
  ['ns_backups','ns_jobs_snap','ns_jobs_etag','ns_stores_etag'].forEach(k=>{ try{localStorage.removeItem(k);}catch(_){} });
  // 2) ns_stores 재압축 — 모바일 미사용 대용량 필드 제거 (다음 sync 시 클라우드가 재공급)
  const DROP=['contacts','equipment','changeLog','storeMemos','memos','fieldUpdatedAt','ecountRegDate','storeRegDate','history'];
  try {
    const raw=localStorage.getItem('ns_stores');
    if (raw) {
      const arr=JSON.parse(raw);
      if (Array.isArray(arr)) {
        const lean=arr.map(s=>{ if(!s||typeof s!=='object')return s; const o={}; for(const k in s){ if(DROP.indexOf(k)>=0)continue; o[k]=s[k]; } return o; });
        const lj=JSON.stringify(lean);
        if (lj.length < raw.length) { try{localStorage.setItem('ns_stores', lj);}catch(_){ try{localStorage.removeItem('ns_stores');}catch(__){} } }
      }
    }
  } catch(_){}
  const after = storageBreakdown().total;
  alert('🗜 정리 완료\n'+fmtKB(before)+' → '+fmtKB(after)+' (문자수)\n확보: '+fmtKB(before-after)+'\n\n작업/매장 데이터는 그대로입니다. 새로고침하면 클라우드에서 최신 매장정보를 다시 받습니다.');
  run();
}

async function run() {
  const out = document.getElementById('out');
  // 0. localStorage 사용량
  const sb = storageBreakdown();
  const estBytes = sb.total*2;                 // UTF-16
  const overWarn = estBytes > 4_500_000;
  const rowsHtml = sb.items.slice(0,12).map(([k,c])=>{
    const big = c > 300_000;
    return `<div style="display:flex;justify-content:space-between;padding:2px 0;${big?'color:#F87171;font-weight:700':''}"><span style="word-break:break-all">${esc(k)}</span><span style="margin-left:10px;white-space:nowrap">${fmtKB(c)}</span></div>`;
  }).join('');
  // 1. 로컬 상태
  let localJobs = [];
  try { localJobs = JSON.parse(localStorage.getItem('ns_jobs')||'[]'); } catch(e){}
  const localResync = localStorage.getItem('ns_resync_token') || '(없음)';
  const localTest = localJobs.filter(j => String(j.storeName||j.store||'').includes(TEST_STORE));
  const mcoreVer = (window.NS_MOBILE_CORE_VERSION || '(m-core.js 로드 안 됨)');

  // 2. 서버 상태
  let serverResync = '?', serverJobs = '?', serverTest = '?', serverErr = '';
  try {
    const r = await fetch('/api/jobs?_cb='+Math.random(), {cache:'no-store'});
    const d = await r.json();
    serverResync = d.resyncToken || '(없음)';
    serverJobs = (d.jobs||[]).length;
    serverTest = (d.jobs||[]).filter(j => String(j.storeName||j.store||'').includes(TEST_STORE)).length;
  } catch(e){ serverErr = String(e); }

  // 3. m-core.js 가 어떤 버전 참조하는지 (이 페이지가 로드한 script src)
  const scriptSrc = Array.from(document.scripts).map(s=>s.src).filter(s=>s.includes('m-core')).join(', ') || '(이 페이지엔 m-core 없음)';

  const tokenMatch = (localResync === serverResync);

  out.innerHTML = `
    <div class="card" style="${overWarn?'border-color:#DC2626':''}">
      <div class="k">📦 localStorage 사용량 (문자수 / UTF-16 추정)</div>
      <div class="v ${overWarn?'bad':'ok'}">${fmtKB(sb.total)} / ~${(estBytes/1024/1024).toFixed(2)}MB ${overWarn?'🔴 한도(5MB) 임박 — 아래 [캐시 정리]':'✓ 여유'}</div>
      <div style="margin-top:8px;font-size:12px">${rowsHtml}</div>
      <div class="k" style="margin-top:6px;color:#64748B">300KB 초과 키는 빨강. ns_backups·ns_stores 가 크면 [🗜 캐시 정리] 누르면 확보됩니다.</div>
    </div>
    <div class="card">
      <div class="k">m-core.js 버전</div>
      <div class="v">${esc(mcoreVer)}</div>
    </div>
    <div class="card">
      <div class="k">로컬 resync_token</div>
      <div class="v">${esc(localResync)}</div>
      <div class="k" style="margin-top:8px">서버 resync_token</div>
      <div class="v">${esc(serverResync)}</div>
      <div class="k" style="margin-top:8px">토큰 일치</div>
      <div class="v ${tokenMatch?'warn':'ok'}">${tokenMatch ? '⚠ 같음 — force-resync 안 일어남' : '✓ 다름 — 다음 sync 시 force-resync 발동해야 함'}</div>
    </div>
    <div class="card">
      <div class="k">로컬 ns_jobs 총</div>
      <div class="v">${localJobs.length}건</div>
      <div class="k" style="margin-top:8px">로컬 ${TEST_STORE} 작업</div>
      <div class="v ${localTest.length?'bad':'ok'}">${localTest.length}건 ${localTest.length?'🔴 (잔존)':'✓ (없음)'}</div>
      ${localTest.length ? `<pre>${esc(JSON.stringify(localTest.map(j=>({id:j.id,type:j.type,thread:(j.thread||[]).length})),null,1))}</pre>` : ''}
    </div>
    <div class="card">
      <div class="k">서버 ns_jobs 총</div>
      <div class="v">${serverJobs}건</div>
      <div class="k" style="margin-top:8px">서버 ${TEST_STORE} 작업</div>
      <div class="v ${serverTest?'bad':'ok'}">${serverTest}건 ${serverTest?'🔴':'✓ (없음 — 서버는 깨끗)'}</div>
      ${serverErr?`<div class="v bad">서버 오류: ${esc(serverErr)}</div>`:''}
    </div>
    <div class="card" style="border-color:#475569">
      <div class="k">이 페이지가 로드한 m-core script</div>
      <div class="v" style="font-size:11px">${esc(scriptSrc)}</div>
    </div>
  `;
}

async function hardReset() {
  if (!confirm('localStorage 의 작업/매장 데이터를 비우고 서버에서 새로 받습니다.\n계속할까요?')) return;
  try {
    localStorage.removeItem('ns_jobs');
    localStorage.removeItem('ns_stores');
    localStorage.removeItem('ns_resync_token');
    // 서버에서 새로 받아 저장
    const r = await fetch('/api/jobs?_cb='+Math.random(), {cache:'no-store'});
    const d = await r.json();
    const delIds = new Set((d.deleted||[]).map(e=>String(e.id||'')));
    const clean = (d.jobs||[]).filter(j => j && j.id && !delIds.has(j.id));
    (window._safeSetItem || ((k,v)=>localStorage.setItem(k,v)))('ns_jobs', JSON.stringify(clean));
    if (d.resyncToken) localStorage.setItem('ns_resync_token', d.resyncToken);
    alert('✅ 초기화 완료 — ' + clean.length + '건 받음. 작업 화면으로 돌아가 확인하세요.');
    run();
  } catch(e) {
    alert('초기화 실패: ' + e.message);
  }
}

run();
</script>
</body>
</html>
