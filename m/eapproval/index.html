<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#2563EB">
<title>📝 전자결재 — NeoRetail 모바일</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--p:#2563EB;--g50:#F8FAFC;--g100:#F1F5F9;--g200:#E2E8F0;--g300:#CBD5E1;--g500:#64748B;--g600:#475569;--g700:#334155;--g900:#0F172A;--ok:#16A34A;--danger:#DC2626}
  html,body{height:100%;font-family:'Pretendard Variable',-apple-system,sans-serif;background:#F0F2F5;color:var(--g900);-webkit-text-size-adjust:100%}
  .appbar{position:sticky;top:0;z-index:10;background:linear-gradient(135deg,#1E3A8A,#2563EB);color:#fff;display:flex;align-items:center;gap:8px;padding:11px 14px;padding-top:calc(11px + env(safe-area-inset-top));height:auto}
  .appbar .back{background:rgba(255,255,255,.16);border:none;color:#fff;width:32px;height:32px;border-radius:9px;font-size:17px;cursor:pointer}
  .appbar .title{font-size:15.5px;font-weight:800;flex:1}
  .appbar .pc{color:#fff;background:rgba(255,255,255,.14);padding:5px 10px;border-radius:99px;text-decoration:none;font-size:11px;font-weight:700}
  .wrap{max-width:760px;margin:0 auto;padding:12px 12px 90px}
  .view{display:none}.view.active{display:block}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .chip{padding:7px 13px;border-radius:20px;border:1.5px solid var(--g200);background:#fff;font-weight:700;cursor:pointer;font-size:12.5px;color:var(--g600)}
  .chip.on{background:#EFF6FF;border-color:var(--p);color:var(--p)}
  .chip .n{display:inline-block;background:var(--danger);color:#fff;font-size:10px;border-radius:10px;padding:0 5px;margin-left:4px}
  .card{background:#fff;border:1px solid var(--g200);border-radius:12px;padding:13px 14px;margin-bottom:10px;cursor:pointer}
  .card.done{background:#DFE2E6;border:1px solid #15803D}
  .ctop{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:6px}
  .title2{font-size:14px;font-weight:800;margin-bottom:3px}
  .meta{font-size:11.5px;color:var(--g500)}
  .kind{font-size:10px;font-weight:800;padding:2px 7px;border-radius:6px}
  .k-pay{background:#FEF3C7;color:#92400E}.k-buy{background:#DBEAFE;color:#1E40AF}.k-leave{background:#DCFCE7;color:#166534}.k-gen{background:#F3E8FF;color:#7E22CE}
  .mine{font-size:10px;font-weight:800;background:#FEE2E2;color:#991B1B;padding:2px 7px;border-radius:6px}
  .st{font-size:10px;font-weight:800;padding:2px 7px;border-radius:6px;margin-left:auto}
  .s-wait{background:#FEF3C7;color:#92400E}.s-ok{background:#DCFCE7;color:#166534}.s-rej{background:#FEE2E2;color:#991B1B}.s-rec{background:#E2E8F0;color:#475569}
  .line{display:flex;align-items:center;gap:4px;margin-top:8px;flex-wrap:wrap}
  .step{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:14px;background:var(--g100);color:var(--g500)}
  .step.done{background:#DCFCE7;color:#166534}.step.cur{background:#FEF3C7;color:#92400E;box-shadow:0 0 0 2px #FDE68A}.step.rej{background:#FEE2E2;color:#991B1B}
  .arr{color:var(--g300);font-size:10px}
  .empty{text-align:center;color:#94A3B8;padding:46px 0;font-size:13px}
  .btn{border:none;border-radius:10px;padding:12px 15px;font-size:14px;font-weight:800;cursor:pointer}
  .btn-p{background:var(--p);color:#fff}.btn-o{background:#fff;color:var(--g700);border:1.5px solid var(--g300)}
  .btn-ok{background:var(--ok);color:#fff}.btn-rej{background:#fff;color:var(--danger);border:1.5px solid #FCA5A5}
  .fab{position:fixed;right:16px;bottom:calc(74px + env(safe-area-inset-bottom));background:var(--p);color:#fff;border:none;border-radius:99px;padding:13px 20px;font-size:14px;font-weight:800;box-shadow:0 6px 18px rgba(37,99,235,.4);cursor:pointer;z-index:20}
  .sech{font-size:11.5px;font-weight:800;color:var(--g500);margin:15px 0 7px}
  /* docform */
  .docform-title{text-align:center;font-size:17px;font-weight:900;letter-spacing:4px;margin:2px 0 10px}
  .tblwrap{border:2px solid #334155;border-radius:6px;overflow:hidden;margin-bottom:8px}
  .tbl{width:100%;border-collapse:collapse;border:1px solid #475569;table-layout:fixed;background:#fff}
  .tbl th{background:#E8EDF3;border:1px solid #475569;padding:8px 6px;font-size:11.5px;font-weight:800;text-align:center;color:#1F2937;word-break:keep-all;width:30%}
  .tbl td{border:1px solid #475569;padding:0}
  .tbl td input,.tbl td select,.tbl td textarea{display:block;width:100%;border:none;background:transparent;font-size:13px;outline:none;padding:8px 7px;font-family:inherit;box-sizing:border-box}
  .tbl td input:focus,.tbl td select:focus,.tbl td textarea:focus{background:#FFFBEB;box-shadow:inset 0 0 0 2px #FCD34D}
  .tbl td textarea{min-height:52px;resize:vertical}
  .tbl td.val{padding:8px 7px;font-size:13px;white-space:pre-wrap}
  .dash{color:#cbd5e1}
  .fld{margin-bottom:12px}
  .fld label{display:block;font-size:11.5px;font-weight:800;color:var(--g600);margin-bottom:5px}
  .fld input,.fld select,.fld textarea{width:100%;padding:11px;border:1px solid var(--g300);border-radius:9px;font-size:14px;background:#fff;font-family:inherit}
  .fld-ta{width:100%;padding:10px;border:1px solid var(--g300);border-radius:9px;font-size:13px;min-height:54px;margin-bottom:8px;font-family:inherit}
  .picker{display:flex;flex-wrap:wrap;gap:6px}
  .pk{padding:8px 12px;border-radius:18px;border:1.5px solid var(--g300);background:#fff;font-size:12.5px;font-weight:700;color:var(--g600);cursor:pointer}
  .pk.on{background:var(--p);border-color:var(--p);color:#fff}
  .att-btn{padding:6px 11px;border:1px solid var(--g300);background:#fff;border-radius:7px;font-size:12px;font-weight:700;color:var(--g600);cursor:pointer}
  .hist{font-size:12px;padding:6px 0;border-bottom:1px solid var(--g100)}
  .hact{font-weight:800;color:var(--ok);font-size:11px}.hact.rej{color:var(--danger)}
  .hts{color:#94A3B8;font-size:11px;margin-left:4px}
  .hop{color:var(--g600);font-size:11.5px;margin-top:2px;padding-left:8px;border-left:2px solid #FCA5A5}
  .execbox{border-radius:10px;padding:11px 13px;font-size:12.5px;font-weight:700}
  .execbox.done{background:#F0FDF4;border:1px solid #BBF7D0;color:#166534}
  .execbox.wait{background:#FFFBEB;border:1px solid #FDE68A;color:#92400E}
  .actrow{display:flex;gap:8px;margin-top:12px}.actrow .btn{flex:1}
  .att-imgs{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0}
  .att-pv{max-width:46%;max-height:200px;border:1px solid var(--g200);border-radius:9px;cursor:zoom-in}
  .att-item{border:1px solid var(--g200);border-radius:9px;background:#fff;padding:6px 9px;font-size:11.5px;font-weight:700;color:var(--g600);display:inline-flex;align-items:center;gap:6px;margin:0 6px 6px 0}
  .att-item img{width:38px;height:38px;object-fit:cover;border-radius:6px}
  .att-item .x{cursor:pointer;color:var(--danger);font-weight:900}
  .att-zone{border:1.5px dashed var(--g300);border-radius:10px;padding:13px;background:var(--g50);text-align:center;cursor:pointer;font-size:12.5px;color:var(--g500);font-weight:700}
  .lb{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9500;display:flex;align-items:center;justify-content:center;padding:20px}
  .lb img{max-width:96vw;max-height:90vh;border-radius:6px}
  .lb .x{position:fixed;top:14px;right:16px;background:rgba(255,255,255,.16);color:#fff;border:1.5px solid rgba(255,255,255,.5);border-radius:24px;padding:8px 15px;font-weight:800;font-size:13px}
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--g200);display:flex;justify-content:space-around;padding:6px 0 calc(6px + env(safe-area-inset-bottom));z-index:15}
  .bottom-nav .item{flex:1;text-align:center;text-decoration:none;color:var(--g500);font-size:10.5px;font-weight:700;padding:3px 0}
  .bottom-nav .item .icn{display:block;font-size:18px;margin-bottom:1px}
  .linkcard{background:#F0FDF4;border:1px solid #BBF7D0;border-radius:10px;padding:11px;margin-top:10px;font-size:12px;color:#166534}
  /* 상단 메뉴 탭바 */
  .tabbar{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
  .tb{flex:0 0 auto;padding:8px 12px;border:1.5px solid var(--g200);background:#fff;border-radius:10px;font-weight:800;font-size:12.5px;color:var(--g600);cursor:pointer;white-space:nowrap}
  .tb.on{background:#1E3A8A;border-color:#1E3A8A;color:#fff}
  /* 연차관리 */
  .lvcard{background:#fff;border:1px solid var(--g200);border-radius:12px;padding:14px;margin-bottom:6px}
  .lv-n{font-size:12px;font-weight:800;color:var(--g500);margin-bottom:8px}
  .lv-row{display:flex;gap:14px;align-items:baseline;font-size:13px;color:var(--g600)}
  .lv-row b{font-size:16px;color:var(--g900)}
  .lv-rem{margin-left:auto}.lv-rem b{color:var(--ok)}
  .mtbl{width:100%;border-collapse:collapse;font-size:12.5px;background:#fff;border:1px solid var(--g200);border-radius:8px;overflow:hidden}
  .mtbl th{background:var(--g50);padding:7px 6px;font-size:11px;color:var(--g500);font-weight:800;text-align:center}
  .mtbl td{padding:7px 8px;border-top:1px solid var(--g100)}
  /* 자금관리 */
  .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px}
  .fco{background:#fff;border:1px solid var(--g200);border-radius:10px;padding:11px 12px}
  .fco-n{font-size:11.5px;color:var(--g500);font-weight:700;margin-bottom:4px}
  .fco-b{font-size:15px;font-weight:800;color:var(--g900)}
  .txr{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--g200);border-radius:9px;padding:8px 11px;margin-bottom:6px;font-size:12px}
  .txd{color:var(--g500);flex:0 0 auto;font-size:11px}
  .txc{color:var(--g500);flex:0 0 auto}
  .txt{flex:1;min-width:0;color:var(--g700);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .txa{flex:0 0 auto;font-weight:800}.txa.in{color:#166534}.txa.out{color:#B91C1C}
  /* 일정 */
  .schrow{display:flex;gap:10px;align-items:center;background:#fff;border:1px solid var(--g200);border-radius:9px;padding:9px 12px;margin-bottom:6px;font-size:13px}
  .schd{color:var(--p);font-weight:800;flex:0 0 auto}
  /* 서식본문(rich) 조회 */
  .richview{font-size:13px;line-height:1.6;white-space:normal;word-break:break-word}
  .richview img{max-width:100%;border-radius:4px;margin:4px 0;display:block}
  .eap-rt{border-collapse:collapse;width:100%;margin:6px 0;font-size:12px}
  .eap-rt td,.eap-rt th{border:1px solid #94A3B8;padding:4px 6px;word-break:break-all}
  .eap-rt th{background:#EEF2F7;font-weight:700}
</style>
</head>

  <button class="back" id="backBtn" onclick="appBack()" style="display:none">←</button>

</header>

<div class="wrap">
  <section class="view active" id="view-list"></section>
  <section class="view" id="view-detail"></section>

<button class="fab" id="fab" onclick="_eapNewDraft()">✏️ 새 기안</button>

  <a class="item" href="/m/"><span class="icn">🏠</span>홈</a>

<script src="/m-core.js?v=2026-07-10-name-fix"></script>
<script>
/* ════════════════════════════════════════════════
   전자결재 모바일 SPA
   ⚠ 데이터 모델·상태전이는 PC app/eapproval.js 와 동일(쌍둥이) — 한쪽 수정 시 양쪽.
   m-core: esc / _kstNow / _safeSetItem / showToast / getUsers 사용. 로그인 게이트 자동.
════════════════════════════════════════════════ */
(function(){
  'use strict';
  const DOCS_LS='ns_eap_docs', DOCS_ETAG='ns_eap_docs_etag', CFG_LS='ns_eap_cfg', DEL_LS='ns_eap_deleted';
  const ADMIN_EMAILS=['zoolex@gmail.com'];
  let SUB='received', TAB='appr';

  /* helpers */
  const esc = window.esc || (s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])));
  const J = v=>JSON.stringify(v);
  function toast(m){try{if(window.showToast)return window.showToast(m);}catch(_){}}
  function kstNow(){try{if(window._kstNow)return window._kstNow();}catch(_){}return new Date(Date.now()+9*3600*1000).toISOString().slice(0,16).replace('T',' ');}
  function kstDate(){return new Date(Date.now()+9*3600*1000).toISOString().slice(0,10);}
  function won(n){return (Number(n)||0).toLocaleString('ko-KR')+'원';}
  function commaFmt(v){if(v===''||v==null)return '';const n=Number(String(v).replace(/,/g,''));return isNaN(n)?String(v):n.toLocaleString('ko-KR');}
  function fsize(n){n=Number(n)||0;return n<1024?n+'B':n<1048576?(n/1024).toFixed(0)+'KB':(n/1048576).toFixed(1)+'MB';}
  function genId(p){return (p||'D')+Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
  function setItem(k,v){try{if(window._safeSetItem)window._safeSetItem(k,v);else localStorage.setItem(k,v);}catch(_){}}

  function getUsers(){try{if(window.getUsers)return window.getUsers()||[];}catch(_){}try{return JSON.parse(localStorage.getItem('ns_users')||'[]');}catch(_){return [];}}
  function authState(){try{return JSON.parse(localStorage.getItem('ns_auth')||'null');}catch(_){return null;}}
  function ME(){const a=authState();if(!a)return '';const users=getUsers();const me=users.find(u=>(u.id||'').toLowerCase()===(a.id||a.email||'').toLowerCase());return (me&&me.name)||a.name||a.email||'';}
  function STAFF(){const names=getUsers().map(u=>u&&u.name).filter(Boolean);const me=ME();if(me&&!names.includes(me))names.unshift(me);return [...new Set(names)];}
  function isAdmin(){const a=authState();if(a&&a.role==='admin')return true;if(a&&ADMIN_EMAILS.includes((a.id||a.email||'').toLowerCase()))return true;return false;}
  const FUND_EXECUTORS=['김혜연'];
  function canExecFund(){return isAdmin()||FUND_EXECUTORS.includes(ME());}
  // 권한 (PC app/eapproval.js 와 동일 — 쌍둥이. 한쪽 수정 시 양쪽)
  const MANAGERS=['이동호','김혜연'];
  function canEditLeave(){return isAdmin()||MANAGERS.includes(ME());}
  function canManageRoutes(){return isAdmin()||MANAGERS.includes(ME());}
  const FUND_MEMBERS=['정필성','이동호','김혜연','오근례'];
  function canViewFund(){return isAdmin()||FUND_MEMBERS.includes(ME());}

  /* 공휴일 / 근무일 (PC app/eapproval.js 와 동일 — 쌍둥이) */
  const KR_HOLIDAYS_BUILTIN=['2026-01-01','2026-02-16','2026-02-17','2026-02-18','2026-03-01','2026-03-02','2026-05-05','2026-05-24','2026-05-25','2026-06-06','2026-08-15','2026-08-17','2026-09-24','2026-09-25','2026-09-26','2026-09-28','2026-10-03','2026-10-05','2026-10-09','2026-12-25'];
  function effHolidaySet(){const s=new Set(KR_HOLIDAYS_BUILTIN);const cfg=getCfg();if(Array.isArray(cfg.holidays))cfg.holidays.forEach(d=>d&&s.add(d));try{JSON.parse(localStorage.getItem('ns_eap_holidays')||'[]').forEach(d=>s.add(d));}catch(_){}if(Array.isArray(cfg.holidayExcludes))cfg.holidayExcludes.forEach(d=>s.delete(d));return s;}
  function isoOf(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
  function workingDays(from,to){if(!from)return 0;const start=new Date(from+'T00:00:00'),end=new Date((to||from)+'T00:00:00');if(isNaN(start)||isNaN(end)||end<start)return 0;const hol=effHolidaySet();let n=0;for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)){const dow=d.getDay();if(dow===0||dow===6)continue;if(hol.has(isoOf(d)))continue;n++;}return n;}
  async function pullHolidays(){try{const y=new Date(Date.now()+9*3600*1000).getFullYear();const all=new Set();for(const yr of [y,y+1]){const r=await fetch('/api/holidays?year='+yr);if(r.ok){const j=await r.json();(j.holidays||[]).forEach(d=>all.add(d));}}if(all.size)localStorage.setItem('ns_eap_holidays',JSON.stringify([...all]));}catch(_){}}

  /* data layer */
  function getDocs(){try{return JSON.parse(localStorage.getItem(DOCS_LS)||'[]');}catch(_){return [];}}
  function writeDocs(a){setItem(DOCS_LS,JSON.stringify(a));}
  function setDocs(a){writeDocs(a);schedulePush();}
  function getCfg(){try{return JSON.parse(localStorage.getItem(CFG_LS)||'{}');}catch(_){return {};}}
  function mergeEapCfg(local,cloud){local=local||{};cloud=cloud||{};const out=Object.assign({},local);for(const k of ['routes','birth','leave','lineMap','fund'])if(cloud[k]&&typeof cloud[k]==='object')out[k]=Object.assign({},local[k]||{},cloud[k]);for(const k of ['holidays','holidayExcludes']){const a=Array.isArray(local[k])?local[k]:[],b=Array.isArray(cloud[k])?cloud[k]:[];if(a.length||b.length)out[k]=[...new Set([...a,...b])];}if(Array.isArray(cloud.tpl)&&cloud.tpl.length){const byId=new Map((Array.isArray(local.tpl)?local.tpl:[]).map(t=>[t.id,t]));cloud.tpl.forEach(t=>{if(t&&t.id)byId.set(t.id,t);});out.tpl=[...byId.values()];}out.updatedAt=Date.now();return out;}
  function getTpls(){const t=getCfg().tpl;return Array.isArray(t)?t:[];}
  function tplById(id){return getTpls().find(t=>t.id===id);}
  function getRoutes(){const r=getCfg().routes;return (r&&typeof r==='object')?r:{};}
  function myRoute(n){const r=getRoutes()[n||ME()];return Array.isArray(r)?r.slice():[];}
  function getDeleted(){try{return JSON.parse(localStorage.getItem(DEL_LS)||'[]');}catch(_){return [];}}

  /* 연차/자금 데이터 (PC app/eapproval.js 쌍둥이) — 모바일은 조회 중심(자금 입력/마감은 PC) */
  function getLeaveAll(){const l=getCfg().leave;return (l&&typeof l==='object')?l:{};}
  function getLeave(n){return getLeaveAll()[n]||{total:15,used:0};}
  const FUND_LS='ns_eap_fund', FUND_COS=['인토개인','인토법인','네오솔루션','세이브넷'];
  function getFundTx(){try{return JSON.parse(localStorage.getItem(FUND_LS)||'[]');}catch(_){return [];}}
  function getFundMeta(){const f=getCfg().fund||{};return {opening:f.opening||{},openingDate:f.openingDate||kstDate(),closings:(f.closings&&typeof f.closings==='object')?f.closings:{},cats:(f.cats&&typeof f.cats==='object')?f.cats:{}};}
  function fundBalAsOf(co,date){const m=getFundMeta();let b=Number(m.opening[co]||0);getFundTx().forEach(t=>{if(t&&t.co===co&&t.date>=m.openingDate&&t.date<=date)b+=(t.dir==='in'?(Number(t.amount)||0):-(Number(t.amount)||0));});return b;}

  let _pushT=null;
  function schedulePush(){clearTimeout(_pushT);_pushT=setTimeout(doPush,1200);}
  async function doPush(){
    try{
      const res=await fetch('/api/eapproval',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({docs:getDocs()})});
      if(res.ok){try{localStorage.removeItem(DOCS_ETAG);}catch(_){}}
    }catch(e){}
  }
  let _syncing=false;
  async function syncFromCloud(){
    if(_syncing)return;_syncing=true;
    try{
      const etag=localStorage.getItem(DOCS_ETAG)||'';
      const res=await fetch('/api/eapproval',{headers:etag?{'If-None-Match':etag}:{}});
      if(res.status===304){_syncing=false;return;}
      if(!res.ok){_syncing=false;return;}
      const ne=res.headers.get('ETag');if(ne)localStorage.setItem(DOCS_ETAG,ne);
      const data=await res.json();
      const cloudDocs=Array.isArray(data.docs)?data.docs:[];
      const cloudDel=Array.isArray(data.deleted)?data.deleted:[];
      const delSet=new Set([...getDeleted(),...cloudDel]);
      try{localStorage.setItem(DEL_LS,JSON.stringify([...delSet]));}catch(_){}
      const local=getDocs(),byId=new Map(),mt=d=>Number(d&&(d.updatedAt||d.createdAt))||0;
      for(const d of local)if(d&&d.id&&!delSet.has(String(d.id)))byId.set(String(d.id),d);
      for(const d of cloudDocs){if(!d||!d.id||delSet.has(String(d.id)))continue;const id=String(d.id),ex=byId.get(id);if(!ex||mt(d)>=mt(ex))byId.set(id,d);}
      writeDocs([...byId.values()]);
      try{localStorage.setItem(CFG_LS,JSON.stringify(mergeEapCfg(getCfg(),data.config||{})));}catch(_){}
      // 자금 거래(view 전용) — 클라우드 값 반영 (모바일은 fund 를 push 안 함)
      try{if(Array.isArray(data.fund))setItem(FUND_LS,JSON.stringify(data.fund));}catch(_){}
      // 최신 결재상태 반영 — 폼 작성 중이 아니면 현재 화면 재렌더(목록/상세)
      const v=parseHash().view; if(v==='list')renderList(); else if(v==='detail')render();
    }catch(e){}
    _syncing=false;
  }

  /* ── docform ── */
  // 서식본문(rich) 정제 렌더 — PC sanitizeRich 쌍둥이(화이트리스트 재구성). 모바일은 조회 전용.
  function sanitizeRichM(html){
    const src=String(html||'');if(!src)return '';
    const idoc=document.implementation.createHTMLDocument('x');idoc.body.innerHTML=src;
    const ALLOW={B:1,STRONG:1,I:1,EM:1,U:1,S:1,P:1,DIV:1,SPAN:1,TABLE:1,THEAD:1,TBODY:1,TR:1,TD:1,TH:1,UL:1,OL:1,LI:1};
    const walk=(node)=>{let out='';node.childNodes.forEach(ch=>{
      if(ch.nodeType===3){out+=esc(ch.nodeValue).replace(/\n/g,'<br>');return;}
      if(ch.nodeType!==1)return;
      const tag=ch.tagName;
      if(tag==='BR'){out+='<br>';return;}
      if(tag==='IMG'){const s=ch.getAttribute('src')||'';if(/^data:image\//i.test(s))out+='<img src="'+s+'" style="max-width:100%">';return;}
      if(tag==='SCRIPT'||tag==='STYLE'||tag==='IFRAME'||tag==='OBJECT')return;
      if(!ALLOW[tag]){out+=walk(ch);return;}
      let attrs='';
      if(tag==='TD'||tag==='TH'){const cs=parseInt(ch.getAttribute('colspan'))||0,rs=parseInt(ch.getAttribute('rowspan'))||0;if(cs>1)attrs+=' colspan="'+cs+'"';if(rs>1)attrs+=' rowspan="'+rs+'"';}
      if(tag==='TABLE')attrs=' class="eap-rt"';
      const t=tag.toLowerCase();out+='<'+t+attrs+'>'+walk(ch)+'</'+t+'>';
    });return out;};
    return walk(idoc.body);
  }
  function ci(label,type,vals,mode,opts){
    const v=(vals&&vals[label]!=null)?vals[label]:'';
    if(mode==='view'){if(v===''||v==null)return '<span class="dash">-</span>';if(type==='rich')return '<div class="richview">'+sanitizeRichM(v)+'</div>';if(type==='money')return '<b>'+commaFmt(v)+'원</b>';if(type==='number')return commaFmt(v);return esc(v);}
    const da='data-eapf="'+esc(label)+'"';
    // rich — 표·이미지(HTML) 포함이면 모바일 편집 불가: hidden 으로 원본 보존(재상신 유실 방지)+미리보기.
    //         일반 텍스트뿐이면 textarea 로 계속 입력 가능(줄바꿈은 표시 시 <br> 변환).
    if(type==='rich'){
      if(v&&/<\w+[^>]*>/.test(v))return '<input type="hidden" '+da+' value="'+esc(v)+'"><div class="richview" style="opacity:.85;padding:8px 7px">'+sanitizeRichM(v)+'</div><div class="meta" style="padding:0 7px 6px">✏️ 표·이미지 포함 본문 편집은 PC에서 (내용은 보존됩니다)</div>';
      return '<textarea '+da+' placeholder="내용 입력 (표·이미지 붙여넣기는 PC에서)">'+esc(v)+'</textarea>';
    }
    if(type==='textarea')return '<textarea '+da+'>'+esc(v)+'</textarea>';
    if(type==='select'){const o=String(opts||'').split(',').map(s=>s.trim()).filter(Boolean);return '<select '+da+'><option value="">선택</option>'+o.map(x=>'<option '+(x===v?'selected':'')+'>'+esc(x)+'</option>').join('')+'</select>';}
    if(type==='date')return '<input '+da+' type="date" value="'+esc(v||'')+'">';
    if(type==='money'||type==='number')return '<input '+da+' type="text" inputmode="numeric" value="'+esc(commaFmt(v))+'" oninput="_eapFmt(this)">';
    if(label==='제목')return '<input '+da+' type="text" value="'+esc(v)+'" placeholder="제목" oninput="_eapTitleForm(this)">';
    return '<input '+da+' type="text" value="'+esc(v)+'">';
  }
  window._eapFmt=function(el){let raw=String(el.value||'').replace(/[^0-9.]/g,'');const p=raw.split('.');let i=p[0].replace(/^0+(?=\d)/,'');i=i?Number(i).toLocaleString('ko-KR'):'';el.value=p.length>1?(i||'0')+'.'+p.slice(1).join(''):i;};
  // 모든 양식 내용부분에 '제목' 필드 보장
  function effFields(t){const fs=(t&&Array.isArray(t.fields))?t.fields.slice():[];if(!fs.some(f=>f&&f.label==='제목'))fs.unshift({label:'제목',type:'text'});return fs;}
  function docFormHtml(t,mode,vals){
    const hasTitle=(t.fields||[]).some(f=>f.label==='제목');
    let rows=(t.fields||[]).map(f=>'<tr><th>'+esc(f.label)+'</th><td class="'+(mode==='view'?'val':'')+'">'+ci(f.label,f.type,vals,mode,f.options)+'</td></tr>').join('');
    if(!hasTitle){rows='<tr><th>제목</th><td class="'+(mode==='view'?'val':'')+'">'+ci('제목','text',vals,mode)+'</td></tr>'+rows;}
    return '<div class="docform-title">'+esc(t.name)+'</div><div class="tblwrap"><table class="tbl"><colgroup><col style="width:32%"><col></colgroup>'+rows+'</table></div>';
  }

  /* ── detail ── */
  function attView(atts){
    atts=atts||[];if(!atts.length)return '';
    window._eapAtts=atts;
    const isImg=a=>/^image\//.test(a.type||'')&&a.dataUrl;
    const imgs=atts.filter(isImg);window._eapLb=imgs.map(a=>a.dataUrl);
    let filesHtml='';
    atts.forEach((a,i)=>{
      if(isImg(a))return;
      filesHtml+=a.dataUrl
        ? '<div class="att-item" style="cursor:pointer;color:#2563EB" onclick="_eapOpenAtt('+i+')">📄 '+esc(a.name)+' '+fsize(a.size)+'</div>'
        : '<div class="att-item">📄 '+esc(a.name)+' '+fsize(a.size)+' · <span style="color:#94A3B8">내용 미저장(구 첨부)</span></div>';
    });
    return '<div class="sech">📎 첨부 ('+atts.length+')</div><div class="att-imgs">'+imgs.map((a,i)=>'<img class="att-pv" src="'+a.dataUrl+'" onclick="_eapImg('+i+')">').join('')+'</div>'+filesHtml;
  }
  window._eapImg=function(i){const u=(window._eapLb||[])[i];if(!u)return;const lb=document.createElement('div');lb.className='lb';lb.id='eapLb';lb.innerHTML='<button class="x" onclick="_eapImgClose()">✕ 닫기</button><img src="'+u+'">';lb.onclick=e=>{if(e.target===lb)_eapImgClose();};document.body.appendChild(lb);};
  window._eapImgClose=function(){const el=document.getElementById('eapLb');if(el)el.remove();};
  // 첨부(비이미지) 열기 — dataUrl → Blob → 새 탭. (data: 직접이동은 브라우저 차단 → blob 사용)
  window._eapOpenAtt=function(i){
    const a=(window._eapAtts||[])[i];
    if(!a||!a.dataUrl){toast('첨부 내용이 없습니다');return;}
    try{
      const c=a.dataUrl.indexOf(','),meta=a.dataUrl.slice(0,c),b64=a.dataUrl.slice(c+1);
      const mime=(meta.match(/data:([^;]+)/)||[])[1]||a.type||'application/octet-stream';
      const bin=atob(b64),arr=new Uint8Array(bin.length);for(let k=0;k<bin.length;k++)arr[k]=bin.charCodeAt(k);
      const url=URL.createObjectURL(new Blob([arr],{type:mime}));
      const w=window.open(url,'_blank');
      if(!w){const el=document.createElement('a');el.href=url;el.download=a.name||'attachment';document.body.appendChild(el);el.click();el.remove();}
      setTimeout(()=>URL.revokeObjectURL(url),60000);
    }catch(e){toast('첨부 열기 실패');}
  };

  function renderDetail(id){
    const d=getDocs().find(x=>x.id===id);
    const box=document.getElementById('view-detail');
    if(!d){box.innerHTML='<div class="empty">문서를 찾을 수 없습니다</div>';return;}
    const k=KIND[d.kind]||KIND.gen;
    const t=tplById(d.tplId)||{id:d.tplId,name:d.tpl||'문서',fields:(d.fields||[]).map(f=>({label:f.label,type:f.type}))};
    const vals={};(d.fields||[]).forEach(f=>{vals[f.label]=f.value;});
    if(!vals['제목'])vals['제목']=d.title;
    const hist=(d.history||[]).map(h=>'<div class="hist"><b>'+esc(h.n)+'</b> <span class="hact '+(h.act==='반려'?'rej':'')+'">'+esc(h.act)+'</span> <span class="hts">'+esc(h.at)+'</span>'+(h.op?'<div class="hop">"'+esc(h.op)+'"</div>':'')+'</div>').join('')||'<div class="meta">이력 없음</div>';
    let act='';
    if(isMyTurn(d)){
      act='<textarea id="rejOp" class="fld-ta" placeholder="반려 시 의견 (선택)"></textarea><div class="actrow"><button class="btn btn-ok" onclick="_eapApprove(\''+esc(id)+'\')">✅ 승인</button><button class="btn btn-rej" onclick="_eapReject(\''+esc(id)+'\')">⛔ 반려</button></div>';
    }else if(d.drafter===ME()&&d.status==='wait'){
      act='<button class="btn btn-o" style="width:100%;margin-top:12px" onclick="_eapRecall(\''+esc(id)+'\')">↩ 회수</button>';
    }else if(d.drafter===ME()&&d.status==='recalled'){
      act='<div class="actrow" style="margin-top:12px"><button class="btn btn-o" onclick="_eapEdit(\''+esc(id)+'\')">✏️ 수정 후 재상신</button><button class="btn btn-p" onclick="_eapResubmit(\''+esc(id)+'\')">📤 그대로</button></div>';
    }else if(d.drafter===ME()&&d.status==='rej'){
      act='<div class="meta" style="margin-top:12px;margin-bottom:6px">반려된 기안 — 수정 후 다시 상신할 수 있습니다.</div><div class="actrow"><button class="btn btn-o" onclick="_eapEdit(\''+esc(id)+'\')">✏️ 수정 후 재상신</button><button class="btn btn-p" onclick="_eapResubmit(\''+esc(id)+'\')">📤 그대로</button></div>';
    }
    let execHtml='';
    if(d.kind==='pay'&&d.status==='ok'){
      execHtml=d.execStatus==='done'
        ?'<div class="sech">자금집행</div><div class="execbox done">✅ 집행완료 <span class="meta">'+esc(d.execBy||'')+' · '+esc(d.execAt||'')+'</span></div>'
        :'<div class="sech">자금집행</div><div class="execbox wait">⏳ 집행 대기'+(canExecFund()?'<button class="btn btn-ok" style="width:100%;margin-top:8px" onclick="_eapExec(\''+esc(id)+'\')">💸 집행완료 처리</button>':'')+'</div>';
    }
    box.innerHTML='<div class="ctop"><span class="kind '+k.cls+'">'+k.label+'</span>'+stBadge(d)+'</div>'
      +docFormHtml(t,'view',vals)+execHtml
      +'<div class="sech">결재선</div>'+lineHtml(d)
      +((d.cc&&d.cc.length)?'<div class="meta" style="margin-top:6px">참조: '+d.cc.map(esc).join(', ')+'</div>':'')
      +attView(d.attachments)
      +'<div class="sech">처리 이력</div>'+hist+act;
  }

  /* ── actions ── */
  window._eapApprove=function(id){const docs=getDocs(),d=docs.find(x=>x.id===id);if(!d||!isMyTurn(d))return;d.history=d.history||[];d.history.push({n:ME(),act:'승인',at:kstNow()});d.step++;d.updatedAt=Date.now();
    if(d.step>=d.line.length){d.status='ok';if(d.kind==='leave'&&d.days){const c=getCfg();c.leave=c.leave||{};const l=c.leave[d.drafter]||{total:15,used:0};l.used=(Number(l.used)||0)+Number(d.days);c.leave[d.drafter]=l;c.updatedAt=Date.now();setItem(CFG_LS,JSON.stringify(c));pushCfg();}setDocs(docs);notify(d.drafter,'done',d);toast('✅ 최종 승인');}
    else{setDocs(docs);notify((d.line[d.step]||{}).n,'request',d);toast('✅ 승인 — 다음 결재자에게');}
    location.hash='';};
  window._eapReject=function(id){const docs=getDocs(),d=docs.find(x=>x.id===id);if(!d||!isMyTurn(d))return;const op=(document.getElementById('rejOp')||{}).value||'';d.history=d.history||[];d.history.push({n:ME(),act:'반려',at:kstNow(),op});d.status='rej';d.updatedAt=Date.now();setDocs(docs);notify(d.drafter,'rejected',d);toast('⛔ 반려');location.hash='';};
  window._eapRecall=function(id){const docs=getDocs(),d=docs.find(x=>x.id===id);if(!d||d.drafter!==ME()||d.status!=='wait')return;d.status='recalled';d.updatedAt=Date.now();d.history=d.history||[];d.history.push({n:ME(),act:'회수',at:kstNow()});setDocs(docs);toast('↩ 회수');location.hash='';};
  window._eapResubmit=function(id){const docs=getDocs(),d=docs.find(x=>x.id===id);if(!d||d.drafter!==ME()||(d.status!=='recalled'&&d.status!=='rej'))return;d.status='wait';d.step=1;d.updatedAt=Date.now();d.history=d.history||[];d.history.push({n:ME(),act:'재상신',at:kstNow()});setDocs(docs);notify((d.line[1]||{}).n,'request',d);toast('📤 재상신');location.hash='';};
  window._eapExec=function(id){const docs=getDocs(),d=docs.find(x=>x.id===id);if(!d||d.kind!=='pay'||d.status!=='ok'||!canExecFund())return;d.execStatus='done';d.execBy=ME();d.execAt=kstNow();d.updatedAt=Date.now();setDocs(docs);notify(d.drafter,'exec',d);toast('💸 집행완료');render();};
  async function pushCfg(){try{await fetch('/api/eapproval',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({config:getCfg()})});}catch(_){}}

  /* ── form (draft) ── */
  let draftTpl=null,draftLine=[],draftCC=[],_editDocId=null,_editVals={};
  window._eapEdit=function(id){const d=getDocs().find(x=>x.id===id);if(!d)return;if(d.drafter!==ME()){toast('본인 기안만 수정 가능');return;}_editDocId=id;location.hash='#form';if(parseHash().view==='form')render();};
  window._eapNewDraft=function(){_editDocId=null;_editVals={};draftTpl=null;location.hash='#form';};
  function renderForm(){
    const tpls=getTpls();
    if(!tpls.length){document.getElementById('view-form').innerHTML='<div class="empty">등록된 양식이 없습니다.<br>PC에서 양식을 먼저 등록하세요.</div>';return;}
    let editDoc=null;
    if(_editDocId){editDoc=getDocs().find(x=>x.id===_editDocId);if(!editDoc)_editDocId=null;}
    if(_editDocId&&editDoc){
      const t=tplById(editDoc.tplId);
      const dfs=(editDoc.fields&&editDoc.fields.length)?editDoc.fields.map(f=>{const tf=(t&&t.fields||[]).find(x=>x.label===f.label);return {label:f.label,type:f.type,options:tf?tf.options:undefined};}):((t&&t.fields)||[]);
      draftTpl={id:editDoc.tplId,name:(t&&t.name)||editDoc.tpl||'문서',cat:editDoc.kind||(t&&t.cat)||'gen',fields:dfs};
      draftLine=(editDoc.line||[]).filter(s=>s.role!=='기안').map(s=>s.n);
      draftCC=(editDoc.cc||[]).slice();
      _editVals={};(editDoc.fields||[]).forEach(f=>_editVals[f.label]=f.value);
    }else{
      draftTpl=draftTpl&&tplById(draftTpl.id)?draftTpl:tpls[0];
      draftLine=myRoute().filter(n=>n!==ME());draftCC=[];_editVals={};
    }
    const editing=!!_editDocId;
    const tplOpts=tpls.map(t=>'<option value="'+esc(t.id)+'" '+(draftTpl&&t.id===draftTpl.id?'selected':'')+'>'+esc(t.name)+'</option>').join('');
    const staff=STAFF().filter(n=>n!==ME());
    document.getElementById('view-form').innerHTML=
      '<div class="fld"><label>문서 양식</label><select id="fTpl" onchange="_eapTplChange(this.value)" '+(editing?'disabled':'')+'>'+tplOpts+'</select></div>'
      +'<div class="fld"><label>제목</label><input id="fTitle" placeholder="제목 입력" oninput="_eapTitleTop()"></div>'
      +'<div id="fFields"></div>'
      +'<div class="fld"><label>결재선 (순서대로 선택)</label><div class="picker" id="fLine">'+staff.map(n=>'<span class="pk '+(draftLine.includes(n)?'on':'')+'" onclick="_eapTL(\''+esc(n)+'\')">'+lblIdx(draftLine,n)+esc(n)+'</span>').join('')+'</div><div class="meta" id="fLinePrev" style="margin-top:6px"></div></div>'
      +'<div class="fld"><label style="display:flex;align-items:center;gap:8px">참조<button type="button" class="att-btn" style="margin-left:auto" onclick="_eapCCAll()">전체 선택</button></label><div class="picker" id="fCC">'+staff.map(n=>'<span class="pk '+(draftCC.includes(n)?'on':'')+'" onclick="_eapCC(\''+esc(n)+'\')">'+esc(n)+'</span>').join('')+'</div></div>'
      +'<button class="btn btn-p" style="width:100%;margin-top:6px" onclick="_eapSubmit()">'+(editing?'📤 수정 후 재상신':'📤 상신')+'</button>';
    const ti=document.getElementById('fTitle');if(ti)ti.value=editing?(editDoc.title||''):'';
    renderFormFields();updateLinePrev();
  }
  function lblIdx(arr,n){const i=arr.indexOf(n);return i>=0?'<b>'+(i+1)+'</b> ':'';}
  function renderFormFields(){
    const b=document.getElementById('fFields');if(!b)return;
    b.innerHTML=draftTpl?docFormHtml(draftTpl,'input',_editVals||{}):'';
    if(!draftTpl)return;
    try{_eapTitleTop();}catch(_){}
    if(draftTpl.cat==='leave'){
      b.querySelectorAll('input[type=date]').forEach(i=>i.addEventListener('change',_eapRecalcDays));
      const sel=b.querySelector('[data-eapf="휴가 종류"]');if(sel)sel.addEventListener('change',_eapRecalcDays);
    }
  }
  window._eapTitleForm=function(el){const t=document.getElementById('fTitle');if(t)t.value=el.value;};
  window._eapTitleTop=function(){const f=document.querySelector('#fFields [data-eapf="제목"]');const t=document.getElementById('fTitle');if(f&&t)f.value=t.value;};
  window._eapRecalcDays=function(){
    const b=document.getElementById('fFields');if(!b)return;
    const dates=[...b.querySelectorAll('input[type=date]')].map(i=>i.value).filter(Boolean).sort();
    if(!dates.length)return;
    const from=dates[0],to=dates[dates.length-1];
    let days=workingDays(from,to);
    const sel=b.querySelector('[data-eapf="휴가 종류"]');if(sel&&/반차/.test(sel.value)&&from===to&&days>=1)days=0.5;
    const di=b.querySelector('[data-eapf="일 수"]')||[...b.querySelectorAll('[data-eapf]')].find(el=>/일\s*수|일수/.test(el.getAttribute('data-eapf')));
    if(di)di.value=days;
  };
  window._eapTplChange=function(id){draftTpl=tplById(id);_editVals={};renderFormFields();};
  window._eapTL=function(n){const i=draftLine.indexOf(n);if(i>=0)draftLine.splice(i,1);else draftLine.push(n);const staff=STAFF().filter(x=>x!==ME());document.getElementById('fLine').innerHTML=staff.map(x=>'<span class="pk '+(draftLine.includes(x)?'on':'')+'" onclick="_eapTL(\''+esc(x)+'\')">'+lblIdx(draftLine,x)+esc(x)+'</span>').join('');updateLinePrev();};
  window._eapCC=function(n){const i=draftCC.indexOf(n);if(i>=0)draftCC.splice(i,1);else draftCC.push(n);_renderCC();};
  window._eapCCAll=function(){const staff=STAFF().filter(x=>x!==ME());draftCC=staff.every(x=>draftCC.includes(x))?[]:staff.slice();_renderCC();};
  function _renderCC(){const box=document.getElementById('fCC');if(!box)return;const staff=STAFF().filter(x=>x!==ME());box.innerHTML=staff.map(x=>'<span class="pk '+(draftCC.includes(x)?'on':'')+'" onclick="_eapCC(\''+esc(x)+'\')">'+esc(x)+'</span>').join('');}
  function updateLinePrev(){const el=document.getElementById('fLinePrev');if(el)el.innerHTML='결재선: <b>'+esc(ME())+'</b>(기안)'+(draftLine.length?' → '+draftLine.map(esc).join(' → '):' <span class="dash">(결재자 미지정)</span>');}
  window._eapSubmit=function(){
    if(!draftTpl){toast('양식을 선택하세요');return;}
    const fields=[];effFields(draftTpl).forEach(f=>{const el=document.querySelector('#fFields [data-eapf="'+f.label.replace(/"/g,'\\"')+'"]');let v=el?el.value:'';if(f.type==='money'||f.type==='number')v=String(v).replace(/,/g,'');fields.push({label:f.label,type:f.type,value:v});});
    const tf=fields.find(f=>f.label==='제목');
    const title=(document.getElementById('fTitle')||{}).value.trim()||(tf&&tf.value.trim())||draftTpl.name;
    const cat=draftTpl.cat||'gen',me=ME();
    const line=[{n:me,role:'기안'},...draftLine.map(n=>({n,role:'결재'}))];
    const applyCat=(d)=>{delete d.amount;delete d.from;delete d.to;delete d.days;if(cat==='pay'||cat==='buy'){const a=fields.find(f=>f.type==='money');d.amount=a?Number(a.value)||0:0;if(cat==='pay'&&d.execStatus!=='done')d.execStatus='pending';}if(cat==='leave'){const ds=fields.filter(f=>f.type==='date'&&f.value).map(f=>f.value).sort();const df=fields.find(f=>f.label.includes('일')&&f.type==='number');d.from=ds[0]||kstDate();d.to=ds[ds.length-1]||d.from;d.days=df&&df.value?Number(df.value):workingDays(d.from,d.to);}};
    const docs=getDocs();
    if(_editDocId){
      const d=docs.find(x=>x.id===_editDocId);
      if(!d){toast('문서를 찾을 수 없음');_editDocId=null;return;}
      d.kind=cat;d.title=title;d.tpl=draftTpl.name;d.tplId=draftTpl.id;d.fields=fields;d.line=line;d.step=1;d.status='wait';d.cc=draftCC.slice();
      applyCat(d);d.history=d.history||[];d.history.push({n:me,act:'재상신',at:kstNow()});d.updatedAt=Date.now();
      setDocs(docs);if(d.line[1])notify(d.line[1].n,'request',d);
      const sid=d.id;_editDocId=null;draftTpl=null;toast('📤 수정 후 재상신');location.hash='#detail/'+sid;return;
    }
    const d={id:genId('D'),kind:cat,title,drafter:me,at:kstNow(),tpl:draftTpl.name,tplId:draftTpl.id,fields,line,step:1,status:'wait',history:[{n:me,act:'기안',at:kstNow()}],cc:draftCC.slice(),attachments:[],createdAt:Date.now(),updatedAt:Date.now()};
    applyCat(d);
    docs.push(d);setDocs(docs);
    if(d.line[1])notify(d.line[1].n,'request',d);
    draftTpl=null;toast('📤 상신 완료');location.hash='#detail/'+d.id;
  };

  /* ── boot ── */
  (async function init(){
    try{await syncFromCloud();}catch(_){}
    pullHolidays();
    // 딥링크 ?doc=ID — 동기화가 늦어도 무조건 상세로 진입(미발견 시 renderDetail 안내 + 이후 sync 로 자동 표시)
    try{const id=new URLSearchParams(location.search).get('doc');if(id){location.hash='#detail/'+id;}}catch(_){}
    render();
    // 자동 동기화: 15초 폴링 + 탭복귀/포커스 즉시 (폼 작성 중 제외)
    setInterval(()=>{if(parseHash().view!=='form')syncFromCloud();},15000);
    document.addEventListener('visibilitychange',()=>{if(!document.hidden&&parseHash().view!=='form')syncFromCloud();});
    window.addEventListener('focus',()=>{if(parseHash().view!=='form')syncFromCloud();});
  })();
})();
</script>
</body>
