name = "neoretail-cron"
main = "src/index.js"
compatibility_date = "2026-04-22"

# 업무시간 KST 평일 08:45 ~ 17:45 (매시 45분, 10회/일)
#   KST 08:45 = UTC (전일) 23:45  → 45 23 * * 0-4
#   KST 09:45~17:45 = UTC 00:45~08:45  → 45 0-8 * * 1-5
# + 55분에 워치독(같은 시간대) → 메인 cron 이 어떤 이유로 누락된 경우 보완
[triggers]
crons = [
  "45 23 * * 0-4",
  "45 0-8 * * 1-5",
  "55 23 * * 0-4",
  "55 0-8 * * 1-5",
]
