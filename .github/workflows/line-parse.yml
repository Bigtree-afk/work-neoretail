name: Line 메시지 자동 파싱 (매시 45분)

# 업무시간 KST 평일 08:45 ~ 17:45 (매시 45분, 10회/일)
#   KST 08:45 = UTC (전일) 23:45  → cron: 45 23 * * 0-4
#   KST 09:45~17:45 = UTC 00:45~08:45  → cron: 45 0-8 * * 1-5
# GitHub Actions cron 은 보통 0~15분 지연 — 실제 시작 ~46~60분 사이
on:
  schedule:
    - cron: '45 23 * * 0-4'
    - cron: '45 0-8 * * 1-5'
  workflow_dispatch:
    inputs:
      force:
        description: '업무시간 무시하고 강제 실행'
        type: boolean
        default: false

jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - name: Call line-parse-cron
        env:
          PARSE_SECRET: ${{ secrets.LINE_PARSE_SECRET }}
          FORCE: ${{ inputs.force }}
        run: |
          if [ -z "$PARSE_SECRET" ]; then
            echo "❌ LINE_PARSE_SECRET secret not set"
            exit 1
          fi
          BODY='{}'
          if [ "$FORCE" = "true" ]; then BODY='{"force":true}'; fi
          echo "▶ POST /api/line-parse-cron  body=$BODY"
          RESP=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" \
            -X POST https://work.neoretail.net/api/line-parse-cron \
            -H "authorization: Bearer $PARSE_SECRET" \
            -H "content-type: application/json" \
            -d "$BODY")
          echo "$RESP"
          STATUS=$(echo "$RESP" | grep HTTP_STATUS | cut -d: -f2)
          if [ "$STATUS" != "200" ]; then
            echo "❌ parse failed (status $STATUS)"
            exit 1
          fi
