name: Line 메시지 자동 파싱 (백업 cron)

# ⚠️ 주: 이 워크플로우는 백업입니다. 메인 cron 은 Cloudflare Worker (cron-worker/) 가 담당.
#    GitHub Actions cron 은 가끔 드롭되므로 (예: 2026-05-14) Cloudflare Worker 가 1차 트리거,
#    이 워크플로우가 5분 어긋나게 추가 보장.
# 업무시간 KST 평일 08:50 ~ 17:50 (매시 50분, 10회/일)
#   KST 08:50 = UTC (전일) 23:50  → cron: 50 23 * * 0-4
#   KST 09:50~17:50 = UTC 00:50~08:50  → cron: 50 0-8 * * 1-5
# endpoint 가 idempotent — Worker 가 이미 처리했다면 'no new messages' 리턴
on:
  schedule:
    - cron: '50 23 * * 0-4'
    - cron: '50 0-8 * * 1-5'
  workflow_dispatch:
    inputs:
      force:
        description: '업무시간 무시하고 강제 실행'
        type: boolean
        default: false

jobs:
  parse:
    runs-on: ubuntu-latest
    steps:
      - name: Call line-parse-cron
        env:
          PARSE_SECRET: ${{ secrets.LINE_PARSE_SECRET }}
          FORCE: ${{ inputs.force }}
        run: |
          if [ -z "$PARSE_SECRET" ]; then
            echo "❌ LINE_PARSE_SECRET secret not set"
            exit 1
          fi
          BODY='{}'
          if [ "$FORCE" = "true" ]; then BODY='{"force":true}'; fi
          echo "▶ POST /api/line-parse-cron  body=$BODY"
          RESP=$(curl -sS -w "\nHTTP_STATUS:%{http_code}" \
            -X POST https://work.neoretail.net/api/line-parse-cron \
            -H "authorization: Bearer $PARSE_SECRET" \
            -H "content-type: application/json" \
            -d "$BODY")
          echo "$RESP"
          STATUS=$(echo "$RESP" | grep HTTP_STATUS | cut -d: -f2)
          if [ "$STATUS" != "200" ]; then
            echo "❌ parse failed (status $STATUS)"
            exit 1
          fi
